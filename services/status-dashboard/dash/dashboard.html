<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agora Data Driven -- Status</title>
<style>
  :root {
    --ag-bg:#0b1020; --ag-surface:#141b33; --ag-ink:#eaf0ff; --ag-muted:#9aa7c7;
    --ag-accent:#5b8cff; --ag-accent-2:#27d3a2; --ag-danger:#ff5c7a; --ag-border:#26314f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--ag-bg); color: var(--ag-ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 28px 20px 48px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .brand { font-size: 22px; font-weight: 700; letter-spacing: 0.2px; }
  .brand .dot { color: var(--ag-accent-2); }
  .client { font-size: 16px; color: var(--ag-muted); }
  .meta { color: var(--ag-muted); font-size: 13px; margin-bottom: 26px; }
  .meta span { white-space: nowrap; }
  .meta .sep { opacity: 0.5; padding: 0 8px; }
  #status { color: var(--ag-muted); font-size: 15px; padding: 40px 0; }
  #status.error { color: var(--ag-danger); }
  .summary {
    display: grid; gap: 14px; margin-bottom: 30px;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  }
  .stat {
    background: var(--ag-surface); border: 1px solid var(--ag-border); border-radius: 12px;
    padding: 16px 16px 14px;
  }
  .stat .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ag-muted); }
  .stat .value { font-size: 24px; font-weight: 700; margin-top: 8px; }
  .stat .value.good { color: var(--ag-accent-2); }
  .stat .value.bad { color: var(--ag-danger); }
  .panel {
    background: var(--ag-surface); border: 1px solid var(--ag-border); border-radius: 12px;
    padding: 18px; margin-bottom: 22px;
  }
  .panel h2 { margin: 0 0 14px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ag-muted); }
  .tablewrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
  th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--ag-border); white-space: nowrap; }
  th.num, td.num { text-align: right; }
  thead th { color: var(--ag-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  tbody tr:hover { background: rgba(91,140,255,0.08); }
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pill.fresh { background: rgba(39,211,162,0.14); border: 1px solid var(--ag-accent-2); color: var(--ag-accent-2); }
  .pill.stale { background: rgba(255,92,122,0.14); border: 1px solid var(--ag-danger); color: var(--ag-danger); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">Agora Data Driven<span class="dot">.</span></div>
      <div class="client">/ Status</div>
    </header>
    <div class="meta" id="meta"></div>
    <div id="status">Loading...</div>
    <div id="content" style="display:none">
      <div class="summary" id="summary"></div>
      <div class="panel">
        <h2>Per-client freshness</h2>
        <div class="tablewrap">
          <table id="clients">
            <thead>
              <tr>
                <th>Client</th>
                <th>Last updated</th>
                <th>Data through</th>
                <th>Last JSON update</th>
                <th class="num">Lag</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
  // ES5/ES2015-safe ONLY. Do NOT use optional chaining (?.) or nullish coalescing (??):
  // esprima 4.x (the pre-deploy JS gate) cannot parse them. Use classic && / || guards.
  // A JS syntax error here would strand the page forever on "Loading...".

  function fmtInt(n) {
    if (n === null || n === undefined || isNaN(n)) { return "-"; }
    return Math.round(Number(n)).toLocaleString("en-US");
  }

  // A lag is reported in minutes by the status job. Render it compactly as minutes under an
  // hour, else as hours with one decimal -- so an operator can eyeball "how stale" at a glance.
  function fmtLag(minutes) {
    if (minutes === null || minutes === undefined || isNaN(minutes)) { return "-"; }
    var m = Number(minutes);
    if (m < 0) { m = 0; }
    if (m < 60) { return Math.round(m) + " min"; }
    var hours = m / 60;
    return hours.toFixed(1) + " h";
  }

  // Escape any value before we drop it into innerHTML -- client keys / timestamps come from a
  // JSON document, so treat them as untrusted text, not markup.
  function esc(s) {
    if (s === null || s === undefined) { return "-"; }
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function statusPill(state) {
    // Treat anything that is not explicitly "fresh" as stale, so an unknown/missing state
    // surfaces as a problem rather than silently reading green.
    if (state === "fresh") {
      return '<span class="pill fresh">fresh</span>';
    }
    return '<span class="pill stale">stale</span>';
  }

  function statCard(label, value, kind) {
    var cls = "value";
    if (kind === "good") { cls = "value good"; }
    if (kind === "bad") { cls = "value bad"; }
    return '<div class="stat"><div class="label">' + label + '</div>' +
           '<div class="' + cls + '">' + value + '</div></div>';
  }

  function renderSummary(clients) {
    var total = clients.length;
    var stale = 0;
    var i;
    for (i = 0; i < clients.length; i++) {
      if (clients[i].status !== "fresh") { stale = stale + 1; }
    }
    var fresh = total - stale;
    var html = "";
    html += statCard("Clients", fmtInt(total), "");
    html += statCard("Fresh", fmtInt(fresh), "good");
    html += statCard("Stale", fmtInt(stale), stale > 0 ? "bad" : "good");
    document.getElementById("summary").innerHTML = html;
  }

  function renderTable(clients) {
    var tbody = document.querySelector("#clients tbody");
    if (!clients || !clients.length) {
      tbody.innerHTML = '<tr><td colspan="6">No clients reported.</td></tr>';
      return;
    }
    var rows = "";
    var i;
    for (i = 0; i < clients.length; i++) {
      var c = clients[i];
      rows += "<tr>" +
        "<td>" + esc(c.client) + "</td>" +
        "<td>" + esc(c.last_updated) + "</td>" +
        "<td>" + esc(c.data_through) + "</td>" +
        "<td>" + esc(c.last_json_update) + "</td>" +
        '<td class="num">' + fmtLag(c.lag) + "</td>" +
        "<td>" + statusPill(c.status) + "</td>" +
      "</tr>";
    }
    tbody.innerHTML = rows;
  }

  function render(data) {
    var clients = (data && data.clients) ? data.clients : [];

    var meta = "";
    if (data && data.generated_at) {
      meta += '<span>generated ' + esc(data.generated_at) + "</span>";
    }
    meta += (meta ? '<span class="sep">|</span>' : "") +
            '<span>' + fmtInt(clients.length) + ' client(s) monitored</span>';
    document.getElementById("meta").innerHTML = meta;

    renderSummary(clients);
    renderTable(clients);

    document.getElementById("status").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  function fail(msg) {
    var s = document.getElementById("status");
    s.className = "error";
    s.textContent = msg;
  }

  function load() {
    fetch("/data.json", { credentials: "same-origin" })
      .then(function (resp) {
        if (!resp.ok) { throw new Error("HTTP " + resp.status); }
        return resp.json();
      })
      .then(function (data) { render(data); })
      .catch(function (err) {
        fail("Could not load status data (" + (err && err.message ? err.message : "error") + ").");
      });
  }

  load();
</script>
</body>
</html>
