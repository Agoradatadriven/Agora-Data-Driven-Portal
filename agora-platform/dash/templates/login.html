<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agora Data Driven &mdash; Portal Login</title>
  <style>
    /* Agora Data Driven brand palette (placeholder branding, themed via CSS vars). */
    :root {
      --ag-bg:#0b1020; --ag-surface:#141b33; --ag-ink:#eaf0ff; --ag-muted:#9aa7c7;
      --ag-accent:#5b8cff; --ag-accent-2:#27d3a2; --ag-danger:#ff5c7a; --ag-border:#26314f;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ag-ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(91,140,255,0.18), transparent 60%),
        radial-gradient(900px 500px at 110% 120%, rgba(39,211,162,0.12), transparent 55%),
        var(--ag-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--ag-surface);
      border: 1px solid var(--ag-border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .brand .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--ag-accent);
      box-shadow: 0 0 0 4px rgba(91,140,255,0.18);
    }
    .brand h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.2px;
    }
    .sub {
      color: var(--ag-muted);
      font-size: 13px;
      margin: 6px 0 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--ag-muted);
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 16px;
      background: var(--ag-bg);
      color: var(--ag-ink);
      border: 1px solid var(--ag-border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: var(--ag-accent); }
    button.primary {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      background: var(--ag-accent);
      color: #06122e;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary:hover { filter: brightness(1.05); }
    .error {
      background: rgba(255,92,122,0.12);
      border: 1px solid var(--ag-danger);
      color: var(--ag-ink);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .foot {
      margin-top: 18px;
      text-align: center;
      color: var(--ag-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <span class="dot"></span>
      <h1>Agora Data Driven</h1>
    </div>
    <p class="sub">Client portal &middot; sign in to view your dashboards</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Posts to /login. The portal verifies the password against Secret Manager and, on success,
         mints the .agoradatadriven.com SSO cookie (see platform_sso.py) before redirecting. -->
    <form method="post" action="/login" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@company.com"
             value="{{ email|default('', true) }}" autofocus>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Your portal password">

      <!-- Where to send the user after login; the server fills this from ?next= when present. -->
      <input type="hidden" name="next" value="{{ next|default('/', true) }}">

      <button class="primary" type="submit">Sign in</button>
    </form>

    <p class="foot">Need access? Contact info@agoradatadriven.com</p>
  </main>
</body>
</html>
