<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agora Data Driven &mdash; Portal Login</title>
  {% if favicon %}<link rel="icon" href="{{ favicon }}">{% endif %}
  <style>
    /* Agora Data Driven brand: light, clean -- white space + bold black type + green CTA + purple
       accent (mirrors Creatives/brand.json). */
    :root {
      --ag-green:#4FAB4A; --ag-green-d:#347A30; --ag-purple:#9484FB; --ag-purple-d:#5C4BD0;
      --ag-ink:#1A1B1E; --ag-charcoal:#353535; --ag-muted:#6B7280; --ag-line:#E7E8EE;
      --ag-canvas:#F6F7F9; --ag-white:#fff; --ag-danger:#E5413E;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ag-ink);
      background:
        radial-gradient(720px 420px at 12% -8%, rgba(79,171,74,0.12), transparent 60%),
        radial-gradient(680px 420px at 108% 112%, rgba(148,132,251,0.14), transparent 58%),
        var(--ag-canvas);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 392px;
      background: var(--ag-white);
      border: 1px solid var(--ag-line);
      border-radius: 18px;
      padding: 34px 30px;
      box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 18px 50px rgba(16,24,40,.10);
    }
    .brand { margin-bottom: 22px; }
    .brand svg { display: block; height: 38px; width: auto; }
    h1 { font-size: 21px; margin: 0 0 6px; font-weight: 800; letter-spacing: -.4px; }
    .sub { color: var(--ag-muted); font-size: 13.5px; margin: 0 0 24px; }
    label {
      display: block; font-size: 11px; color: var(--ag-muted); margin: 0 0 6px;
      text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 13px;
      margin-bottom: 16px;
      background: var(--ag-white);
      color: var(--ag-ink);
      border: 1px solid var(--ag-line);
      border-radius: 11px;
      font-size: 14px;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }
    input:focus { border-color: var(--ag-green); box-shadow: 0 0 0 3px rgba(79,171,74,.14); }
    button.primary {
      width: 100%;
      padding: 13px 14px;
      border: 0;
      border-radius: 11px;
      background: var(--ag-green);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(79,171,74,.28);
      transition: background .12s, box-shadow .12s;
    }
    button.primary:hover { background: var(--ag-green-d); }
    .error {
      background: #FDECEC;
      border: 1px solid rgba(229,65,62,0.35);
      color: #9b2c2a;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .foot {
      margin-top: 22px;
      text-align: center;
      color: var(--ag-muted);
      font-size: 12px;
    }
    .foot a { color: var(--ag-purple-d); text-decoration: none; font-weight: 600; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">{{ agora_logo|safe }}</div>
    <h1>Client portal</h1>
    <p class="sub">Sign in to view your dashboards and workspace.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Posts to /login. The portal verifies the password against Secret Manager and, on success,
         mints the .agoradatadriven.com SSO cookie (see platform_sso.py) before redirecting. -->
    <form method="post" action="/login" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@company.com"
             value="{{ email|default('', true) }}" autofocus>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Your portal password">

      <!-- Where to send the user after login; the server fills this from ?next= when present. -->
      <input type="hidden" name="next" value="{{ next|default('/', true) }}">

      <button class="primary" type="submit">Sign in</button>
    </form>

    <p class="foot">Need access? <a href="mailto:info@agoradatadriven.com">info@agoradatadriven.com</a></p>
  </main>
</body>
</html>
